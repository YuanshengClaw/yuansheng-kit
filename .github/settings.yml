repository:
  name: yuansheng-kit
  description: Agent-oriented toolkit for RISC-V optimization knowledge extraction, pattern mining, real-hardware performance analysis, root-cause diagnosis, and code generation
  private: false
  topics: >-
    agent-skills,
    code-generation,
    knowledge-extraction,
    linux-perf,
    pattern-mining,
    performance-optimization,
    riscv,
    root-cause-analysis

  has_issues: true
  has_discussions: false
  has_projects: false
  has_wiki: false
  has_downloads: false

  default_branch: main

  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  allow_auto_merge: false
  allow_update_branch: true
  delete_branch_on_merge: true

  enable_vulnerability_alerts: true
  enable_automated_security_fixes: true

branches:
  - name: main
    protection:
      enforce_admins: null
      
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false

      required_status_checks: null
      restrictions: null
